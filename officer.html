<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Dashboard | Smart City</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="dark-mode">
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
            <a href="index.html"
                style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 10px;">
                <i class="fa-solid fa-city"></i> Smart<span>City</span> <span
                    style="font-size: 0.8rem; background: #ea580c; color: white; padding: 2px 8px; border-radius: 4px;">OFFICER</span>
            </a>
        </div>
        <div class="auth-buttons">
            <span style="display: flex; align-items: center; gap: 10px; margin-right: 15px; color: var(--text-muted);">
                <i class="fa-solid fa-user-shield"></i> <span id="officerName">Officer</span>
            </span>
            <a href="index.html" class="btn btn-secondary">Logout</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li><a href="#" class="active"><i class="fa-solid fa-clipboard-list"></i> Assigned Tasks</a></li>
                <!-- <li><a href="#"><i class="fa-solid fa-map-location-dot"></i> Field Map</a></li> -->
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="dashboard-header">
                <div>
                    <h2>My Tasks</h2>
                    <p style="color: var(--text-muted);">Manage and resolve complaints assigned to you.</p>
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="stat-grid" style="grid-template-columns: repeat(3, 1fr);">
                <div class="stat-card">
                    <div class="stat-icon blue" style="background: rgba(37, 99, 235, 0.15); color: #60a5fa;">
                        <i class="fa-solid fa-list"></i>
                    </div>
                    <div>
                        <h3 id="statAssigned">0</h3>
                        <p style="color: var(--text-muted);">Assigned</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange" style="background: rgba(245, 158, 11, 0.15); color: #fbbf24;">
                        <i class="fa-solid fa-clock"></i>
                    </div>
                    <div>
                        <h3 id="statPending">0</h3>
                        <p style="color: var(--text-muted);">Pending</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green" style="background: rgba(16, 185, 129, 0.15); color: #34d399;">
                        <i class="fa-solid fa-check-circle"></i>
                    </div>
                    <div>
                        <h3 id="statResolved">0</h3>
                        <p style="color: var(--text-muted);">Resolved</p>
                    </div>
                </div>
            </div>

            <!-- Task List -->
            <div class="recent-complaints">
                <h3>Assigned Complaints</h3>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Category</th>
                                <th>Subject</th>
                                <th>Priority</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="workerTableBody">
                            <tr>
                                <td colspan="7" style="text-align:center;">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Resolution Modal -->
            <div class="modal" id="resolveModal">
                <div class="modal-content">
                    <i class="fa-solid fa-times close-modal"
                        onclick="document.getElementById('resolveModal').classList.remove('active')"></i>
                    <h2>Resolve Complaint</h2>
                    <p>Complaint ID: <b id="resolveIdDisplay" style="color:var(--primary)"></b></p>

                    <label
                        style="display:block; margin-top:15px; margin-bottom:5px; color:var(--text-muted);">Resolution
                        Notes:</label>
                    <textarea id="resolveNotes" rows="4" placeholder="Describe how the issue was fixed..."
                        style="width: 100%; border: 1px solid #d1d5db; background: white; color: var(--text-main); padding: 10px; border-radius: 6px;"></textarea>

                    <input type="hidden" id="resolveId">
                    <button onclick="submitResolution()" class="btn btn-primary"
                        style="margin-top: 15px; width: 100%;">Mark as Resolved</button>
                </div>
            </div>

            <!-- View Details Modal (Simplified) -->
            <div class="modal" id="viewModal">
                <div class="modal-content" style="max-width: 600px;">
                    <i class="fa-solid fa-times close-modal"
                        onclick="document.getElementById('viewModal').classList.remove('active')"></i>
                    <h2><i class="fa-solid fa-file-contract"></i> Complaint Details</h2>
                    <div id="viewContent" style="margin-top: 15px; line-height: 1.6;">
                    </div>
                    <button onclick="document.getElementById('viewModal').classList.remove('active')"
                        class="btn btn-secondary" style="margin-top: 20px; width: 100%;">Close</button>
                </div>
            </div>

        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = App.store.getCurrentUser();
            if (!user || user.role !== 'officer') {
                alert('Access Denied. Officers only.');
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('officerName').innerText = user.name;

            const render = () => {
                const myTasks = App.complaints.getOfficerComplaints(user.name);
                const tbody = document.getElementById('workerTableBody');
                tbody.innerHTML = '';

                if (myTasks.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding: 2rem;">No assigned tasks.</td></tr>`;
                } else {
                    myTasks.forEach(c => {
                        const statusClass = `status-${c.status}`;
                        const priorityClass = c.priority === 'High' ? 'color: #ef4444; font-weight:bold;' : (c.priority === 'Medium' ? 'color: #f97316;' : 'color: #16a34a;');

                        const row = `
                            <tr>
                                <td>${c.id}</td>
                                <td>${c.category}</td>
                                <td>${c.subject} <br><span style="font-size:0.75rem; color:var(--text-muted);"><i class="fa-solid fa-location-dot"></i> ${c.location}</span></td>
                                <td style="${priorityClass}">${c.priority}</td>
                                <td><span class="status-badge ${statusClass}">${c.status.toUpperCase()}</span></td>
                                <td>${c.date}</td>
                                <td>
                                    <div style="display:flex; gap:5px;">
                                        <button onclick="openViewModal('${c.id}')" class="btn btn-secondary" style="padding: 4px 6px; font-size: 0.75rem;" title="View"><i class="fa-solid fa-eye"></i></button>
                                        ${c.status !== 'resolved' ?
                                `<button onclick="openResolveModal('${c.id}')" class="btn btn-primary" style="padding: 4px 6px; font-size: 0.75rem;" title="Mark Resolved"><i class="fa-solid fa-check"></i> Resolve</button>`
                                : '<span style="color:#16a34a; font-size:0.8rem;"><i class="fa-solid fa-check"></i> Done</span>'}
                                    </div>
                                </td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                }

                // Stats
                document.getElementById('statAssigned').innerText = myTasks.length;
                document.getElementById('statPending').innerText = myTasks.filter(c => c.status !== 'resolved').length;
                document.getElementById('statResolved').innerText = myTasks.filter(c => c.status === 'resolved').length;
            };

            render();

            // Resolve Logic
            window.openResolveModal = (id) => {
                document.getElementById('resolveId').value = id;
                document.getElementById('resolveIdDisplay').innerText = id;
                document.getElementById('resolveNotes').value = '';
                document.getElementById('resolveModal').classList.add('active');
            };

            window.submitResolution = async () => {
                const id = document.getElementById('resolveId').value;
                const notes = document.getElementById('resolveNotes').value;

                if (confirm("Mark this complaint as resolved?")) {
                    await App.complaints.updateStatus(id, 'resolved', notes);
                    alert("Complaint resolved!");
                    document.getElementById('resolveModal').classList.remove('active');
                    render();
                }
            };

            window.openViewModal = (id) => {
                const c = App.complaints.getAll().find(x => x.id === id);
                const content = document.getElementById('viewContent');
                content.innerHTML = `
                    <p><b style="color:var(--text-main)">ID:</b> ${c.id}</p>
                    <p><b style="color:var(--text-main)">Subject:</b> ${c.subject}</p>
                    <p><b style="color:var(--text-main)">Category:</b> ${c.category}</p>
                    <p><b style="color:var(--text-main)">Description:</b> ${c.description}</p>
                    <p><b style="color:var(--text-main)">Location:</b> ${c.location}</p>
                    ${c.image ? `<img src="${c.image}" style="max-width:100%; margin-top:10px; border-radius:5px;">` : ''}
                `;
                document.getElementById('viewModal').classList.add('active');
            }
        });
    </script>
</body>

</html>
