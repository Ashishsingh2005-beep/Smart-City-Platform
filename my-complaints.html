<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Complaints | Smart City</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="dark-mode">
    <nav class="navbar">
        <div class="logo">
            <a href="index.html"
                style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 10px;">
                <i class="fa-solid fa-city"></i> Smart<span>City</span>
            </a>
        </div>
        <div class="auth-buttons">
            <span style="display: flex; align-items: center; gap: 10px; margin-right: 15px; color: var(--text-muted);">
                <i class="fa-solid fa-user-circle"></i> <span id="userWelcome">Citizen</span>
            </span>
            <a href="#" class="btn btn-secondary">Logout</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fa-solid fa-layer-group"></i> Dashboard</a></li>
                <li><a href="my-complaints.html" class="active"><i class="fa-solid fa-list-check"></i> My Complaints</a>
                </li>
                <li><a href="map-view.html"><i class="fa-solid fa-map"></i> Map View</a></li>
                <li><a href="notifications.html"><i class="fa-solid fa-bell"></i> Notifications</a></li>
                <li><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
                <li><a href="help.html"><i class="fa-solid fa-circle-question"></i> Help & Support</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="dashboard-header" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h2>My Complaints</h2>
                    <p style="color: var(--text-muted);">Detailed history of all your reported issues.</p>
                </div>
                <button onclick="downloadPDF()" class="btn btn-secondary" style="background: rgba(6, 182, 212, 0.1); color: var(--primary-accent); border: 1px solid var(--primary-accent); cursor: pointer;">
                    <i class="fa-solid fa-file-pdf"></i> Download PDF
                </button>
            </div>

            <div class="recent-complaints" id="complaintsToDownload">
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Subject</th>
                                <th>Category</th>
                                <th>Priority</th>
                                <th>Status</th>
                                <th>ETA</th>
                                <th>History</th>
                                <th>Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="complaintsTableBody">
                            <tr>
                                <td colspan="7" style="text-align:center;">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = App.store.getCurrentUser();
            if (!user) { window.location.href = 'login.html'; return; }
            document.getElementById('userWelcome').innerText = user.name;

            await App.store.loadData(); // Fetch latest data
            const myComplaints = App.complaints.getUserComplaints(user.email);
            const tbody = document.getElementById('complaintsTableBody');

            if (myComplaints.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding: 2rem;">No complaints found.</td></tr>`;
            } else {
                tbody.innerHTML = '';
                myComplaints.forEach(c => {
                    const statusClass = `status-${c.status}`;
                    const priorityClass = c.priority === 'High' ? 'color: #ef4444; font-weight:bold;' : (c.priority === 'Medium' ? 'color: #f97316;' : 'color: #16a34a;');

                    let historyHtml = '<small style="color:var(--text-muted);">No history</small>';
                    if (c.history && c.history.length > 0) {
                        historyHtml = c.history.map(h =>
                            `<div style="font-size:0.75rem; border-left:2px solid var(--primary); padding-left:5px; margin-bottom:2px;">
                                    <b>${h.action}</b>: ${h.details} <span style="opacity:0.7">(${new Date(h.timestamp).toLocaleDateString()})</span>
                                </div>`
                        ).join('');
                    }

                    const row = `
                            <tr>
                                <td>${c.id}</td>
                                <td>${c.subject} <br><span style="font-size:0.75rem; color:var(--text-muted);"><i class="fa-solid fa-location-dot"></i> ${c.location}</span></td>
                                <td>${c.category}</td>
                                <td style="${priorityClass}">${c.priority}</td>
                                <td><span class="status-badge ${statusClass}">${c.status.toUpperCase()}</span></td>
                                <td>${c.eta || '-'}</td>
                                <td>${historyHtml}</td>
                                <td>${c.date}</td>
                                <td><button onclick="downloadReceipt('${c.id}')" class="btn btn-secondary" style="padding: 4px 10px; font-size: 0.75rem;"><i class="fa-solid fa-download"></i> Receipt</button></td>
                            </tr>
                        `;
                    tbody.innerHTML += row;
                });
            }
        });

        function downloadPDF() {
            const element = document.getElementById('complaintsToDownload');
            const opt = {
                margin:       0.5,
                filename:     'my_complaints_history.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'landscape' }
            };
            
            // Temporary styling for better PDF rendering in dark mode
            const originalBg = element.style.background;
            element.style.background = '#0f172a'; 
            
            html2pdf().set(opt).from(element).save().then(() => {
                element.style.background = originalBg;
            });
        }

        function downloadReceipt(id) {
            const complaints = App.store.getComplaints();
            const c = complaints.find(comp => comp.id === id);
            if (!c) return;

            // Create a hidden div formatted like a professional receipt
            const receiptDiv = document.createElement('div');
            receiptDiv.style.cssText = "padding: 30px; font-family: 'Outfit', sans-serif; color: #000; background: #fff;";
            receiptDiv.innerHTML = `
                <table style="width: 100%; border-bottom: 2px solid #06b6d4; padding-bottom: 20px; margin-bottom: 20px;">
                    <tr>
                        <td style="text-align: left; vertical-align: middle;">
                            <h1 style="color: #0f172a; margin: 0; font-size: 1.8rem;">SmartCity Governance</h1>
                            <p style="margin: 5px 0 0; color: #64748b;">Official Complaint Report</p>
                        </td>
                        <td style="text-align: right; vertical-align: middle;">
                            <h2 style="margin: 0; color: #06b6d4; font-size: 1.4rem;">${c.id}</h2>
                            <p style="margin: 5px 0 0; color: #64748b;">Date: ${c.date}</p>
                        </td>
                    </tr>
                </table>
                <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px;">
                    <tr><td style="padding: 10px; border: 1px solid #e2e8f0; width: 30%;"><strong>Subject:</strong></td><td style="padding: 10px; border: 1px solid #e2e8f0;">${c.subject}</td></tr>
                    <tr><td style="padding: 10px; border: 1px solid #e2e8f0;"><strong>Category:</strong></td><td style="padding: 10px; border: 1px solid #e2e8f0;">${c.category}</td></tr>
                    <tr><td style="padding: 10px; border: 1px solid #e2e8f0;"><strong>Priority:</strong></td><td style="padding: 10px; border: 1px solid #e2e8f0;">${c.priority}</td></tr>
                    <tr><td style="padding: 10px; border: 1px solid #e2e8f0;"><strong>Status:</strong></td><td style="padding: 10px; border: 1px solid #e2e8f0; font-weight: bold;">${c.status.toUpperCase()}</td></tr>
                    <tr><td style="padding: 10px; border: 1px solid #e2e8f0;"><strong>Location:</strong></td><td style="padding: 10px; border: 1px solid #e2e8f0;">${c.location}</td></tr>
                    <tr><td style="padding: 10px; border: 1px solid #e2e8f0;"><strong>Assigned To:</strong></td><td style="padding: 10px; border: 1px solid #e2e8f0;">${c.assigned_to || 'Pending Assignment'}</td></tr>
                </table>
                <div style="margin-bottom: 30px;">
                    <h3 style="color: #0f172a; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px;">Description</h3>
                    <p style="color: #334155; line-height: 1.6;">${c.description}</p>
                </div>
                <div>
                    <h3 style="color: #0f172a; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px;">Audit Trail (Blockchain verified)</h3>
                    <ul style="list-style: none; padding: 0;">
                        ${c.history ? c.history.map(h => `<li style="margin-bottom: 10px; font-size: 0.9rem;"><strong style="color:#06b6d4;">${new Date(h.timestamp).toLocaleString()}</strong> - ${h.action}: ${h.details}</li>`).join('') : '<li>No history recorded</li>'}
                    </ul>
                </div>
                <div style="margin-top: 50px; text-align: center; font-size: 0.8rem; color: #94a3b8; border-top: 1px solid #e2e8f0; padding-top: 20px;">
                    This is a digitally generated report securely backed by the SmartCity Blockchain Ledger.
                </div>
            `;
            
            const opt = {
                margin:       0.5,
                filename:     `Complaint_Report_${c.id}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            
            html2pdf().set(opt).from(receiptDiv).save();
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</body>

</html>
