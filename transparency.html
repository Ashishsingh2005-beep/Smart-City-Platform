<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transparency Ledger | Smart Complaint Govt.</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .block-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .block-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: var(--primary-accent);
        }

        .block-card:hover {
            transform: scale(1.01);
            border-color: var(--primary-accent);
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.2);
        }

        .hash-text {
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--primary-accent);
            background: rgba(6, 182, 212, 0.1);
            padding: 5px 10px;
            border-radius: 5px;
            word-break: break-all;
        }

        .block-index {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 2rem;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.05);
        }

        .ledger-line {
            position: absolute;
            left: 45px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(255, 255, 255, 0.05);
            z-index: -1;
        }
    </style>
</head>

<body class="dark-mode">
    <nav class="navbar">
        <div class="logo">
            <a href="index.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 10px;">
                <i class="fa-solid fa-shield-halved"></i> Smart<span>Complaint</span>
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Platform</a></li>
            <li><a href="dashboard.html">My Portal</a></li>
            <li><a href="transparency.html" class="active">Blockchain Explorer</a></li>
        </ul>
    </nav>

    <main class="main-content" style="margin-left: 0; padding-top: 100px; max-width: 1000px; margin: 0 auto;">
        <div class="section-header" style="text-align: left; margin-bottom: 40px;">
            <div class="badge" style="display: inline-block; padding: 6px 16px; background: rgba(16, 185, 129, 0.1); color: #10b981; border-radius: 50px; font-size: 0.8rem; font-weight: 700; margin-bottom: 1rem; border: 1px solid rgba(16, 185, 129, 0.2);">
                <i class="fa-solid fa-link"></i> IMMUTABLE GOVERNMENT LEDGER
            </div>
            <h1 style="font-size: 3rem; color: white;">Public Transparency <span>Explorer</span></h1>
            <p style="color: var(--text-light); font-size: 1.1rem;">Live monitoring of the Smart Complaint blockchain. Every action is cryptographically signed and permanent.</p>
        </div>

        <div id="blockchainContainer" style="position: relative;">
            <div class="ledger-line"></div>
            <!-- Blocks will be loaded here -->
            <div style="text-align: center; padding: 50px;" id="loader">
                <i class="fa-solid fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary-accent);"></i>
                <p style="margin-top: 15px; color: var(--text-light);">Syncing with Government Node...</p>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('blockchainContainer');
            const loader = document.getElementById('loader');

            try {
                const chain = await App.api.get('/blockchain');
                loader.style.display = 'none';

                if (!chain || chain.length === 0) {
                    container.innerHTML = "<p style='text-align:center;'>No blocks found in the ledger.</p>";
                    return;
                }

                chain.reverse().forEach(block => {
                    const card = document.createElement('div');
                    card.className = 'block-card';
                    
                    const date = new Date(block.timestamp).toLocaleString();
                    const dataStr = typeof block.data === 'string' ? block.data : JSON.stringify(block.data, null, 2);

                    card.innerHTML = `
                        <div class="block-index">#${block.index}</div>
                        <div style="display: flex; gap: 20px; align-items: flex-start;">
                            <div style="width: 40px; height: 40px; background: var(--primary-accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0; box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);">
                                <i class="fa-solid fa-cube"></i>
                            </div>
                            <div style="flex: 1;">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                                    <h3 style="color: white; font-size: 1.2rem;">Block Validated</h3>
                                    <span style="color: var(--text-light); font-size: 0.85rem; font-weight: 600;">${date}</span>
                                </div>
                                
                                <div style="margin-bottom: 15px;">
                                    <p style="color: var(--text-light); font-size: 0.9rem; margin-bottom: 5px;">Payload Content:</p>
                                    <pre style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; color: #34d399; font-size: 0.85rem; overflow-x: auto;">${dataStr}</pre>
                                </div>

                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                                    <div>
                                        <p style="color: var(--text-light); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Current Hash</p>
                                        <div class="hash-text">${block.hash.substring(0, 32)}...</div>
                                    </div>
                                    <div>
                                        <p style="color: var(--text-light); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Previous Hash</p>
                                        <div class="hash-text">${block.previousHash.substring(0, 32)}...</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                loader.innerHTML = "<p style='color:var(--danger);'>Failed to connect to Blockchain Node.</p>";
            }
        });
    </script>
</body>
</html>
